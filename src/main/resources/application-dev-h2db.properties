#logging.level.net.sf.ehcache.pool.sizeof=debug
logging.level.nl.homeserver=DEBUG

# Hibernate ddl auto (none, validate, create, create-drop, update)
spring.jpa.hibernate.ddl-auto=validate

# Show or not logging for each sql query
spring.jpa.show-sql=false

spring.datasource.url=jdbc:h2:./home-server-db/home-server-database;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;DEFRAG_ALWAYS=true;

# Enable H2 console
spring.h2.console.enabled=true

# Enable the following to enable logging of SQL generated on Hibernate
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.security.user.name=home
spring.security.user.password=home

spring.flyway.baseline-on-migrate=true

home-server.cache.warmup.on-application-start=false
